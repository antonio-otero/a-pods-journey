version: '3.8'
 
# Nota: podman-compose genera un Pod automáticamente
# Todos los contenedores comparten la red del Pod
 
services:
 
  mariadb:
    build:
      context: ./mariadb
      dockerfile: Containerfile
    container_name: lamp-mariadb
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
 php:
    build:
      context: ./php
      dockerfile: Containerfile
    container_name: lamp-php
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: 127.0.0.1   # Mismo pod = localhost
      DB_PORT: '3306'
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      APP_ENV: ${APP_ENV}
    ports:
      - "8080:80"
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./php/src:/var/www/html:ro  # Solo lectura en prod
 
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lamp-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST:     127.0.0.1
      PMA_PORT:     3306
      PMA_USER:     ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      mariadb:
        condition: service_healthy
 
volumes:
  mariadb_data:
    driver: local
